<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Login</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="screen">
      <section class="login-card">
        <p class="language">English (US)</p>
      <img src="./insta.webp" alt="" class="logo">

        <form id="loginForm">
          <input
            id="firstName"
            name="firstName"
            type="text"
            placeholder="First name"
            autocomplete="given-name"
            required
          />
          <input
            id="lastName"
            name="lastName"
            type="text"
            placeholder="Last name"
            autocomplete="family-name"
            required
          />
          <button type="submit">Log in</button>
        </form>

        <a href="#" class="help-link">Forgot password?</a>
        <button class="outline-btn" type="button">Create new account</button>
        <img style="width: 60px; height: 12px; margin:0 auto;" src="./meta.webp" alt="" class="google-logo">
      </section>
    </main>

  <script src="./script.js"></script>
  </body>
</html>
